<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Style Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}

.container{
    width:320px;
    height:620px;
    background:white;
    border-radius:20px;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.logo{
    margin-top:40px;
}

.logo img{
    width:70px;
}

.form{
    width:100%;
}

.form input{
    width:100%;
    padding:15px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:10px;
    background:#fafafa;
    font-size:14px;
}

.login-btn{
    width:100%;
    padding:13px;
    background:#0095F6;
    color:white;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
}

.login-btn:hover{
    background:#1877F2;
}

.forgot{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#333;
    font-size:14px;
}

.bottom{
    width:100%;
    text-align:center;
    margin-bottom:20px;
}

.create{
    width:100%;
    padding:12px;
    border:1px solid #0095F6;
    background:white;
    color:#0095F6;
    border-radius:25px;
    font-size:15px;
    cursor:pointer;
}

.meta{
    margin-top:15px;
    color:#555;
    font-size:15px;
}
</style>

</head>

<body>

<div class="container">

    <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram Logo">
    </div>

    <div class="form">
        <input type="text" placeholder="Username, email or mobile number">

        <input type="password" placeholder="Password">

        <button class="login-btn">
            Log in
        </button>

        <a href="#" class="forgot">Forgot password?</a>
    </div>

    <div class="bottom">

        <button class="create">
            Create new account
        </button>

        <div class="meta">
            ∞ Meta
        </div>

    </div>

</div>

</body>
</html>
